<script>
/**
 * Simulatore display OLED monocromatico.
 * Riproduce fedelmente le coordinate e i font u8g2 usati nel firmware
 * per l'orientazione landscape (128x64).
 *
 * Font simulati (bitmap 1-bit):
 *   u8g2_font_5x7_tr   -> 5x7 px
 *   u8g2_font_6x10_tr  -> 6x10 px
 *   u8g2_font_7x14B_tr -> 7x14 px bold (monitor)
 */

const SCALE = 4;

/* ============================================================ */
/* OLED Canvas Factory                                          */
/* ============================================================ */

function createOLED(parentEl, dispW, dispH) {
  const cvs = document.createElement('canvas');
  cvs.width = dispW * SCALE;
  cvs.height = dispH * SCALE;
  cvs.style.width = (dispW * SCALE) + 'px';
  cvs.style.height = (dispH * SCALE) + 'px';
  const ctx = cvs.getContext('2d');
  ctx.imageSmoothingEnabled = false;

  const buf = ctx.createImageData(dispW, dispH);
  for (let i = 0; i < buf.data.length; i += 4) {
    buf.data[i] = 0; buf.data[i+1] = 0; buf.data[i+2] = 0; buf.data[i+3] = 255;
  }

  function setPixel(x, y) {
    if (x < 0 || x >= dispW || y < 0 || y >= dispH) return;
    const idx = (y * dispW + x) * 4;
    buf.data[idx] = 255; buf.data[idx+1] = 255; buf.data[idx+2] = 255;
  }

  function drawStr(font, fw, fh, x, y, str) {
    for (let ci = 0; ci < str.length; ci++) {
      const glyph = font[str.charCodeAt(ci)];
      if (!glyph) continue;
      for (let row = 0; row < glyph.length; row++) {
        for (let col = 0; col < fw; col++) {
          if (glyph[row] & (1 << (fw - 1 - col))) {
            setPixel(x + ci * fw + col, y + row);
          }
        }
      }
    }
  }

  function flush() {
    const tmp = document.createElement('canvas');
    tmp.width = dispW; tmp.height = dispH;
    tmp.getContext('2d').putImageData(buf, 0, 0);
    ctx.drawImage(tmp, 0, 0, dispW * SCALE, dispH * SCALE);
  }

  const frame = document.createElement('div');
  frame.className = 'oled-frame';
  frame.appendChild(cvs);
  parentEl.appendChild(frame);

  return {
    draw5x7:   (x, y, s) => drawStr(FONT_5x7, 5, 7, x, y, s),
    draw6x10:  (x, y, s) => drawStr(FONT_6x10, 6, 10, x, y, s),
    draw7x14B: (x, y, s) => drawStr(FONT_7x14B, 7, 14, x, y, s),
    setPixel, flush,
  };
}

/* ============================================================ */
/* Rendering                                                     */
/* ============================================================ */

function renderAll() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  grid.className = 'screens-grid';

  for (const scr of screens) {
    const card = document.createElement('div');
    card.className = 'screen-card';

    const tagClass = 'tag-' + scr.tag;

    card.innerHTML =
      '<div class="screen-title">' + scr.title +
      ' <span class="mode-tag ' + tagClass + '">' + scr.tagLabel + '</span></div>' +
      '<div class="screen-desc">' + scr.desc + '</div>';

    const o = createOLED(card, 128, 64);
    scr.drawLand(o);
    o.flush();

    grid.appendChild(card);
  }
}

// Render iniziale
renderAll();
</script>
