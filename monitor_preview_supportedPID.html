<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Scan PID OBD2 — Anteprima offline</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;color:#e0e0e0;font-family:'Segoe UI',-apple-system,Arial,sans-serif;padding:12px;max-width:560px;margin:0 auto}
h1{text-align:center;color:#00d4ff;font-size:1.2em;margin-bottom:4px}
.sub{text-align:center;color:#888;font-size:.78em;margin-bottom:14px}
.sub a{color:#00d4ff;text-decoration:none}
.banner{background:#2a2410;border:1px solid #ca4;border-radius:6px;color:#ca4;font-size:.72em;text-align:center;padding:6px 8px;margin-bottom:14px}
.ecu{background:#1a1a2e;border-radius:8px;padding:10px 12px;margin-bottom:12px;border:1px solid #222}
.eh{display:flex;justify-content:space-between;align-items:baseline;border-bottom:1px solid #222;padding-bottom:6px;margin-bottom:8px}
.eid{color:#00d4ff;font-size:.95em;font-weight:600;letter-spacing:1px}
.ecnt{color:#5588bb;font-size:.78em}
.pl{display:flex;flex-wrap:wrap;gap:6px}
.pl span{background:#0f1a30;border:1px solid #1a3060;border-radius:4px;padding:3px 8px;font-size:.78em;color:#cfe6f5}
.empty{color:#888;font-style:italic;font-size:.85em}
.note{color:#666;font-size:.72em;text-align:center;margin-top:14px}
</style>
</head>
<body>
<h1>Scan PID OBD2</h1>
<p class="sub">PID standard SAE J1979 supportati dagli ECU del veicolo &middot; <a href="monitor_preview.html">Dashboard</a></p>
<div class="banner">ANTEPRIMA OFFLINE — dati simulati realistici per Audi A5 2.7 TDI CGKA</div>
<div id="root">Caricamento...</div>
<p class="note">I PID non documentati nel database SAE sono mostrati come "PID 0xXX".</p>
<script>
/**
 * Simulatore di /scan-data per anteprima offline.
 * Riproduce uno scenario realistico per la A5 2.7 TDI CGKA:
 *  - ECU motore (0x7E8) con ~28 PID totali, di cui ~19 documentati nel
 *    database SAE locale (vedi pid_descriptions.h);
 *  - ECU cambio Multitronic (0x7E9) ipotetico con pochi PID standard.
 * Un dato "totalRaw" comprende anche PID non documentati (omessi
 * dall'elenco visivo, come fa la dashboard live).
 */
var mockScanData = {
  ecus: [
    {
      id: "7E8",
      totalRaw: 28,
      pids: [
        "Carico motore",
        "Temp. liquido",
        "Press. collettore",
        "RPM",
        "Velocita'",
        "Temp. aria aspirata",
        "MAF",
        "Tempo motore",
        "Km con MIL",
        "Press. rail",
        "EGR comandato",
        "Errore EGR",
        "Avviamenti",
        "Press. barometrica",
        "Tensione batteria",
        "Temp. ambiente",
        "Pedale D",
        "Pedale E",
        "Attuatore farfalla"
      ]
    },
    {
      id: "7E9",
      totalRaw: 4,
      pids: [
        "Temp. liquido"
      ]
    }
  ]
};

(function render(d) {
  var root = document.getElementById('root');
  if (!d.ecus || d.ecus.length === 0) {
    root.innerHTML = '<p class="empty">Nessun ECU rilevato.</p>';
    return;
  }
  var html = '';
  d.ecus.forEach(function(e) {
    html += '<div class="ecu"><div class="eh"><span class="eid">ECU ' + e.id +
            '</span><span class="ecnt">' + e.totalRaw +
            ' PID totali (' + e.pids.length + ' documentati)</span></div>';
    if (e.pids.length === 0) {
      html += '<p class="empty">Nessun PID documentato per questo ECU.</p>';
    } else {
      html += '<div class="pl">';
      e.pids.forEach(function(p) { html += '<span>' + p + '</span>'; });
      html += '</div>';
    }
    html += '</div>';
  });
  root.innerHTML = html;
})(mockScanData);
</script>
</body>
</html>
